name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

env:
  REGISTRY: docker.io
  FRONTEND_IMAGE: lcit-frontend
  BACKEND_IMAGE: lcit-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.vars.outputs.TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.TAG }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.TAG }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Kubernetes manifests
        run: |
          sed -i "s|IMAGE_BACKEND|${{ secrets.DOCKER_USERNAME }}/lcit-backend:${{ needs.build-and-push.outputs.image_tag }}|g" k8s/backend.yaml
          sed -i "s|IMAGE_FRONTEND|${{ secrets.DOCKER_USERNAME }}/lcit-frontend:${{ needs.build-and-push.outputs.image_tag }}|g" k8s/frontend.yaml
          sed -i "s|HOST_NAME|${{ secrets.EC2_HOST }}.nip.io|g" k8s/ingress.yaml

      - name: Copy k8s files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "k8s/*"
          target: "~/app"

      - name: Deploy to K3s
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            alias kubectl='k3s kubectl'

            cd ~/app/k8s

            echo "Checking cluster..."
            kubectl get nodes

            echo "Installing cert-manager if missing..."
            if ! kubectl get namespace cert-manager &> /dev/null; then
              kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
              sleep 60
            fi

            echo "Applying manifests..."
            kubectl apply -f secrets.yaml
            kubectl apply -f mongo.yaml
            kubectl apply -f backend.yaml
            kubectl apply -f frontend.yaml
            kubectl apply -f cluster-issuer.yaml
            kubectl apply -f ingress.yaml

            echo "Restarting deployments..."
            kubectl rollout restart deployment/backend
            kubectl rollout restart deployment/frontend

            echo "⏳ Waiting for rollout..."
            kubectl rollout status deployment/backend
            kubectl rollout status deployment/frontend

            echo "Deployment successful."